name: PR Screenshots

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-screenshots-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Generate static site
        run: npm run generate

      - name: Serve static site on port 8080
        run: python3 -m http.server 8080 --directory dist &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting for server... attempt $i"
            sleep 2
          done
          echo "Server did not become ready in time"
          exit 1

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            ./node_modules/.bin/playwright install chromium
          else
            ./node_modules/.bin/playwright install chromium --with-deps
          fi

      - name: Wait 10 seconds before capturing screenshots
        run: sleep 10

      - name: Take HD screenshot (1920x1080)
        run: ./node_modules/.bin/playwright screenshot --browser chromium --viewport-size "1920,1080" --full-page http://localhost:8080/ screenshot-hd.png

      - name: Take iPhone screenshot (390x844)
        run: ./node_modules/.bin/playwright screenshot --browser chromium --viewport-size "390,844" --full-page http://localhost:8080/ screenshot-iphone.png

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-pr-${{ github.event.pull_request.number }}
          path: |
            screenshot-hd.png
            screenshot-iphone.png
          retention-days: 30

  comment:
    runs-on: ubuntu-latest
    needs: capture
    permissions:
      issues: write

    steps:
      - name: Post fresh PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.issue.number;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const artifactName = `screenshots-pr-${pr}`;

            const body = [
              '## PR Screenshots',
              '',
              `A new screenshots artifact is available for this PR: \`${artifactName}\`.`,
              '',
              `[Open workflow run](${runUrl})`
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr,
              body
            });
